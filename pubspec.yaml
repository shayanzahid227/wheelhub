name: wheelhub
description: "wheelHub Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  cached_network_image: ^3.4.1
  dio: ^5.8.0
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.5
  flutter_image_compress: ^2.4.0
  flutter_local_notifications: ^19.0.0
  flutter_screenutil: ^5.9.3
  geolocator: ^13.0.4
  get: ^4.7.2
  get_it: ^8.0.3
  google_fonts: ^6.2.1
  path_provider: ^2.1.5
  shared_preferences: ^2.5.3
  shimmer: ^3.0.0
  webview_flutter: ^4.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - images/dynamic_assets/
    - images/icons_assets/
